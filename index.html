<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>IMMI Presence 360 - Sistem Kehadiran</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    
    <!-- Face API -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <!-- API Config -->
    <script src="api-config.js"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background: linear-gradient(135deg, #f0f5fa 0%, #e6edf4 100%);
            min-height: 100vh;
        }
        
        /* Login Page */
        .login-container {
            min-height: 100vh;
            background: linear-gradient(165deg, #0b1e33 0%, #132b41 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 36px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 50px 70px -20px rgba(0,0,0,0.5);
        }
        
        /* Floating Label Styles */
        .floating-group {
            position: relative;
            margin-bottom: 28px;
        }

        .floating-input {
            width: 100%;
            padding: 18px 16px 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.2s ease;
            outline: none;
        }

        .floating-input:focus {
            border-color: #1e3a8a;
            background: white;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.2s ease;
            background: transparent;
            padding: 0 4px;
        }

        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 0px;
            transform: translateY(-50%);
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e3a8a;
            background: white;
            left: 12px;
        }

        /* Password Eye Button */
        .password-wrapper {
            position: relative;
        }

        .password-eye {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
        }

        .password-eye:hover {
            color: #1e3a8a;
            background: rgba(30, 58, 138, 0.05);
        }

        .password-eye:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* Login Button Animation */
        .login-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .dashboard-header {
            background: linear-gradient(165deg, #0b1e33 0%, #132b41 100%);
            padding: 32px 24px 64px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        
        .glass-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 200px;
            border: 2px solid #fbbf24;
            border-radius: 80px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .face-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .face-box {
            position: absolute;
            border: 3px solid #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            border-radius: 10px;
            pointer-events: none;
        }
        
        .hidden { display: none !important; }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -150%);
            background: white;
            border-radius: 16px;
            padding: 16px 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            z-index: 9999;
            border-left: 4px solid #059669;
            transition: transform 0.3s;
        }
        
        .notification.show { transform: translate(-50%, 0); }
        .notification.error { border-left-color: #dc2626; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .challenge-box {
            background: #1e3a8a;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: #1e3a8a;
            width: 0%;
            transition: width 0.3s;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .status-badge.success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .status-badge.warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .status-badge.info {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .status-badge.error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Mobile Optimizations */
        @media (max-width: 640px) {
            .dashboard-header {
                padding: 24px 16px 56px;
            }
            
            .glass-card {
                padding: 16px;
            }
            
            .text-5xl {
                font-size: 2.5rem;
            }
            
            .grid-cols-2 {
                gap: 8px;
            }
            
            .btn-primary, .bg-green-600, .bg-gray-200 {
                padding: 14px 12px;
                font-size: 1rem;
                min-height: 52px;
            }
            
            .video-wrapper {
                aspect-ratio: 3/4;
            }
            
            .face-guide {
                width: 120px;
                height: 160px;
            }
            
            .attendance-history {
                max-height: 300px;
            }
            
            button {
                min-height: 48px;
                touch-action: manipulation;
            }
            
            .text-xs {
                font-size: 0.7rem;
            }
            
            .bg-gray-50.p-4 {
                padding: 12px;
            }
            
            .bg-white.p-4 {
                padding: 12px;
            }
            
            .progress-bar {
                margin: 8px 0;
            }
            
            .challenge-box {
                padding: 10px;
                font-size: 0.9rem;
            }
            
            .floating-input {
                padding: 16px 14px 6px 14px;
                font-size: 0.95rem;
            }
            
            .floating-label {
                font-size: 0.9rem;
            }
            
            .floating-input:focus ~ .floating-label,
            .floating-input:not(:placeholder-shown) ~ .floating-label {
                font-size: 0.65rem;
            }
        }

        /* Fix untuk iOS */
        input, button {
            -webkit-appearance: none;
            border-radius: 14px;
        }

        /* Landscape mode */
        @media (orientation: landscape) and (max-height: 500px) {
            .dashboard-header {
                padding: 16px 16px 40px;
            }
            
            .glass-card {
                padding: 12px;
            }
            
            .video-wrapper {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>

        <p class="text-xs text-gray-600 mt-1" id="notifMessage"></p>
    </div>

            </div>
            
            <div class="space-y-4">
                <!-- Email Field with Floating Label -->

    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null;
        let userLocation = null;
        let videoStream = null;
        let faceMatcher = null;
        let locationWatchId = null;
        let modelsLoaded = false;
        let isVerifying = false;
        let faceOverlay = null;

        // Audio untuk notifikasi
        let audioSuccess = null;
        let audioError = null;

        // ============================================
        // PASSWORD VISIBILITY TOGGLE
        // ============================================
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('loginPassword');
            const eyeIcon = document.querySelector('.password-eye .material-symbols-rounded');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility_off';
            }
        }

        // ============================================
        // AUDIO FUNCTIONS
        // ============================================
        function initAudio() {
            try {
                const successUrl = 'https://ik.imagekit.io/pyreotmgq/berjaya.mp3?updatedAt=1773883565780';
                const errorUrl = 'https://ik.imagekit.io/pyreotmgq/gagal.mp3?updatedAt=1773883736989';
                
                audioSuccess = new Audio(successUrl);
                audioError = new Audio(errorUrl);
                
                audioSuccess.volume = 0.7;
                audioError.volume = 0.7;
                
                console.log('✅ Audio initialized');
            } catch (e) {
                console.error('❌ Failed to initialize audio:', e);
            }
        }

        function playSound(type) {
            try {
                if (type === 'success' && audioSuccess) {
                    audioSuccess.play().catch(e => console.log('Audio play failed:', e));
                } else if (type === 'error' && audioError) {
                    audioError.play().catch(e => console.log('Audio play failed:', e));
                }
            } catch (e) {
                console.error('Audio play error:', e);
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showNotification(title, message, isError = false, playAudio = true) {
            const notif = document.getElementById('notification');
            document.getElementById('notifTitle').innerText = title;
            document.getElementById('notifMessage').innerText = message;
            notif.className = `notification show ${isError ? 'error' : ''}`;
            
            if (playAudio) {
                playSound(isError ? 'error' : 'success');
            }
            
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function updateProgress(percent) {
            const progressFill = document.getElementById('progressFill');
            if (progressFill) {
                progressFill.style.width = percent + '%';
            }
        }

        function formatJam(decimalJam) {
            if (!decimalJam || decimalJam <= 0) return '-';
            const jam = Math.floor(decimalJam);
            const minit = Math.round((decimalJam - jam) * 60);
            
            if (minit === 0) return `${jam}j`;
            if (minit < 10) return `${jam}j 0${minit}m`;
            return `${jam}j ${minit}m`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // VIDEO DIMENSIONS HELPER
        // ============================================
        function getVideoDimensions(videoEl) {
            const videoWidth = videoEl.videoWidth;
            const videoHeight = videoEl.videoHeight;
            const containerWidth = videoEl.clientWidth;
            const containerHeight = videoEl.clientHeight;
            
            const videoAspectRatio = videoWidth / videoHeight;
            const containerAspectRatio = containerWidth / containerHeight;
            
            let displayWidth, displayHeight;
            
            if (containerAspectRatio > videoAspectRatio) {
                displayHeight = containerHeight;
                displayWidth = videoAspectRatio * displayHeight;
            } else {
                displayWidth = containerWidth;
                displayHeight = displayWidth / videoAspectRatio;
            }
            
            const offsetX = (containerWidth - displayWidth) / 2;
            const offsetY = (containerHeight - displayHeight) / 2;
            
            return {
                videoWidth,
                videoHeight,
                displayWidth,
                displayHeight,
                offsetX,
                offsetY,
                scaleX: displayWidth / videoWidth,
                scaleY: displayHeight / videoHeight
            };
        }

        function adjustFaceBox(box, dims) {
            return {
                x: box.x * dims.scaleX + dims.offsetX,
                y: box.y * dims.scaleY + dims.offsetY,
                width: box.width * dims.scaleX,
                height: box.height * dims.scaleY
            };
        }

        // ============================================
        // FACE API MODELS
        // ============================================
        async function loadFaceModels() {
            if (modelsLoaded) return true;
            
            const MODEL_URL = 'https://cdn.jsdelivr.net/gh/jimswk/IMMI-Presence-360@main/models';
            
            try {
                console.log('🔄 Loading face models...');
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                
                modelsLoaded = true;
                console.log('✅ All face models loaded successfully');
                return true;
                
            } catch (error) {
                console.error('❌ Failed to load models:', error);
                showNotification('Amaran', 'Pengesahan wajah mungkin tidak berfungsi', true, false);
                return false;
            }
        }

        // ============================================
        // LOCATION FUNCTIONS
        // ============================================
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }

        function updateLocationDisplay() {
            if (!currentUser || !currentUser.lat || !currentUser.lng || !userLocation) {
                document.getElementById('locationStatus').innerHTML = '<span class="text-gray-500">Mengesan lokasi...</span>';
                document.getElementById('distanceStatus').innerText = '-';
                return;
            }
            
            const distance = calculateDistance(
                userLocation.lat,
                userLocation.lng,
                parseFloat(currentUser.lat),
                parseFloat(currentUser.lng)
            );
            
            const radius = parseInt(currentUser.radius) || 500;
            const within = distance <= radius;
            
            const locationEl = document.getElementById('locationStatus');
            const distanceEl = document.getElementById('distanceStatus');
            
            if (within) {
                locationEl.innerHTML = '<span class="text-green-600 font-bold">✓ DALAM KAWASAN BERTUGAS</span>';
            } else {
                locationEl.innerHTML = '<span class="text-red-500 font-bold">✗ LUAR KAWASAN BERTUGAS</span>';
            }
            
            distanceEl.innerText = `${Math.round(distance)}m / ${radius}m`;
        }

        function startLocationTracking() {
            if (!navigator.geolocation) {
                document.getElementById('locationStatus').innerHTML = '<span class="text-red-500">GPS tidak disokong</span>';
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    updateLocationDisplay();
                },
                (error) => {
                    console.error('GPS error:', error);
                    document.getElementById('locationStatus').innerHTML = '<span class="text-red-500">Gagal mengesan GPS</span>';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
            
            locationWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    updateLocationDisplay();
                },
                (error) => {
                    console.error('GPS watch error:', error);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 30000,
                    timeout: 27000
                }
            );
        }

        // ============================================
        // CHECK TODAY ATTENDANCE - DIPERBAIKI
        // ============================================
        async function checkTodayAttendance() {
            if (!currentUser) return;
            
            const today = new Date().toISOString().split('T')[0];
            
            console.log('Checking attendance for user:', currentUser.uid, 'date:', today);
            
            try {
                const result = await callAPI('getAttendance', { 
                    uid: currentUser.uid, 
                    startDate: today, 
                    endDate: today 
                });
                
                console.log('Attendance API response:', result);
                
                const statusEl = document.getElementById('attendanceStatus');
                const clockInBtn = document.getElementById('clockInBtn');
                const clockOutBtn = document.getElementById('clockOutBtn');
                
                // RESET BUTTONS TO DEFAULT ENABLED STATE FIRST
                clockInBtn.disabled = false;
                clockInBtn.className = 'bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-colors';
                clockOutBtn.disabled = true;
                clockOutBtn.className = 'bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold opacity-50 cursor-not-allowed';
                
                // Jika gagal mendapatkan data, set default
                if (!result.success) {
                    console.error('Failed to get attendance:', result.error);
                    statusEl.innerText = 'BELUM MASUK';
                    statusEl.className = 'px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold';
                    return;
                }
                
                // Jika tiada rekod hari ini
                if (!result.data || result.data.length === 0) {
                    console.log('No attendance record for today');
                    statusEl.innerText = 'BELUM MASUK';
                    statusEl.className = 'px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold';
                    return;
                }
                
                const record = result.data[0];
                console.log('Today record:', record);
                
                // SEMAK BERDASARKAN STATUS FIELD
                if (record.status === 'clocked_in') {
                    console.log('User is clocked in (status)');
                    statusEl.innerText = 'DALAM BERTUGAS';
                    statusEl.className = 'px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold';
                    
                    clockInBtn.disabled = true;
                    clockInBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                    clockOutBtn.disabled = false;
                    clockOutBtn.className = 'bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-colors';
                    
                } else if (record.status === 'clocked_out') {
                    console.log('User is clocked out (status)');
                    statusEl.innerText = 'SELESAI';
                    statusEl.className = 'px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold';
                    
                    clockInBtn.disabled = true;
                    clockInBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                    clockOutBtn.disabled = true;
                    clockOutBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                    
                } else {
                    // FALLBACK: Semak berdasarkan clockIn dan clockOut values
                    const hasClockIn = record.clockIn && record.clockIn !== '' && record.clockIn !== 'null' && record.clockIn !== '0';
                    const hasClockOut = record.clockOut && record.clockOut !== '' && record.clockOut !== 'null' && record.clockOut !== '0';
                    
                    console.log('Fallback check - hasClockIn:', hasClockIn, 'hasClockOut:', hasClockOut);
                    
                    if (hasClockIn && !hasClockOut) {
                        console.log('User is clocked in (fallback)');
                        statusEl.innerText = 'DALAM BERTUGAS';
                        statusEl.className = 'px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold';
                        
                        clockInBtn.disabled = true;
                        clockInBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                        clockOutBtn.disabled = false;
                        clockOutBtn.className = 'bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-colors';
                        
                    } else if (hasClockIn && hasClockOut) {
                        console.log('User is clocked out (fallback)');
                        statusEl.innerText = 'SELESAI';
                        statusEl.className = 'px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold';
                        
                        clockInBtn.disabled = true;
                        clockInBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                        clockOutBtn.disabled = true;
                        clockOutBtn.className = 'bg-gray-400 text-white py-4 rounded-2xl font-bold cursor-not-allowed opacity-50';
                        
                    } else {
                        console.log('User has no clock in today (fallback)');
                        statusEl.innerText = 'BELUM MASUK';
                        statusEl.className = 'px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold';
                        // Butang sudah dalam keadaan default (clockIn enabled, clockOut disabled)
                    }
                }
                
            } catch (error) {
                console.error('❌ Ralat menyemak attendance:', error);
                // Reset to default state on error
                const statusEl = document.getElementById('attendanceStatus');
                const clockInBtn = document.getElementById('clockInBtn');
                const clockOutBtn = document.getElementById('clockOutBtn');
                
                statusEl.innerText = 'BELUM MASUK';
                statusEl.className = 'px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold';
                clockInBtn.disabled = false;
                clockInBtn.className = 'bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-colors';
                clockOutBtn.disabled = true;
                clockOutBtn.className = 'bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold opacity-50 cursor-not-allowed';
            }
        }

        // ============================================
        // FACE VERIFICATION FUNCTIONS
        // ============================================
        
        function isSmiling(landmarks) {
            if (!landmarks) return false;
            
            const mouth = landmarks.getMouth();
            if (!mouth || mouth.length < 20) return false;
            
            const leftMouthCorner = mouth[0];
            const rightMouthCorner = mouth[6];
            const upperLip = mouth[3];
            const lowerLip = mouth[9];
            
            const mouthWidth = Math.hypot(
                rightMouthCorner.x - leftMouthCorner.x,
                rightMouthCorner.y - leftMouthCorner.y
            );
            
            const mouthHeight = Math.hypot(
                lowerLip.x - upperLip.x,
                lowerLip.y - upperLip.y
            );
            
            const smileRatio = mouthWidth / (mouthHeight + 0.1);
            
            return smileRatio > 2.0;
        }

        async function getFaceDescriptor(video) {
            try {
                const detection = await faceapi
                    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                
                return detection;
            } catch (error) {
                console.error('❌ Error getting face descriptor:', error);
                return null;
            }
        }

        async function verifyFace() {
            if (isVerifying) return false;
            isVerifying = true;
            
            if (!faceMatcher) {
                showNotification('Wajah Tidak Didaftar', 'Sila hubungi admin untuk pendaftaran wajah', true, false);
                isVerifying = false;
                return false;
            }
            
            const scanContainer = document.getElementById('scanContainer');
            const scanVideo = document.getElementById('scanVideo');
            const scanStatus = document.getElementById('scanStatus');
            const challengeDisplay = document.getElementById('challengeDisplay');
            const clockInBtn = document.getElementById('clockInBtn');
            const clockOutBtn = document.getElementById('clockOutBtn');
            
            scanContainer.classList.remove('hidden');
            clockInBtn.disabled = true;
            clockOutBtn.disabled = true;
            
            faceOverlay = document.getElementById('faceOverlay');
            
            try {
                await loadFaceModels();
                
                scanStatus.innerText = 'Mengakses kamera...';
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                scanVideo.srcObject = stream;
                videoStream = stream;
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                let faceDetectionInterval = setInterval(async () => {
                    if (!scanVideo || !scanVideo.srcObject) return;
                    
                    try {
                        const dims = getVideoDimensions(scanVideo);
                        const detections = await faceapi.detectAllFaces(scanVideo, 
                            new faceapi.TinyFaceDetectorOptions());
                        
                        if (faceOverlay) faceOverlay.innerHTML = '';
                        
                        if (detections.length > 0) {
                            const box = detections[0].detection.box;
                            const adjustedBox = adjustFaceBox(box, dims);
                            
                            const faceBox = document.createElement('div');
                            faceBox.className = 'face-box';
                            faceBox.style.left = `${adjustedBox.x}px`;
                            faceBox.style.top = `${adjustedBox.y}px`;
                            faceBox.style.width = `${adjustedBox.width}px`;
                            faceBox.style.height = `${adjustedBox.height}px`;
                            faceOverlay.appendChild(faceBox);
                        }
                    } catch (e) {}
                }, 100);
                
                updateProgress(30);
                challengeDisplay.innerText = '😊 SILA SENYUM';
                scanStatus.innerText = 'Sila senyum lebar...';
                
                let smileDetected = false;
                let smileStartTime = Date.now();
                
                while (Date.now() - smileStartTime < 5000) {
                    updateProgress(30 + ((Date.now() - smileStartTime) / 5000) * 40);
                    
                    const detection = await faceapi.detectSingleFace(scanVideo, 
                        new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceExpressions();
                    
                    if (detection) {
                        if (detection.expressions && detection.expressions.happy > 0.5) {
                            smileDetected = true;
                            break;
                        }
                        
                        if (detection.landmarks && isSmiling(detection.landmarks)) {
                            smileDetected = true;
                            break;
                        }
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                clearInterval(faceDetectionInterval);
                
                if (!smileDetected) {
                    throw new Error('Senyum tidak dikesan. Sila senyum dengan jelas.');
                }
                
                updateProgress(80);
                challengeDisplay.innerText = '👤 MENGESAHKAN WAJAH';
                scanStatus.innerText = 'Memadankan wajah dengan rekod...';
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const detection = await getFaceDescriptor(scanVideo);
                
                if (!detection) {
                    throw new Error('Wajah tidak dapat dikesan. Sila pastikan wajah dalam bingkai.');
                }
                
                if (!detection.descriptor) {
                    throw new Error('Deskriptor wajah tidak dapat dijana');
                }
                
                const match = faceMatcher.findBestMatch(detection.descriptor);
                
                if (match.label !== currentUser.uid || match.distance >= 0.65) {
                    throw new Error('Wajah tidak sepadan dengan rekod');
                }
                
                updateProgress(100);
                challengeDisplay.innerText = '✅ PENGESAHAN BERJAYA';
                scanStatus.innerText = 'Wajah disahkan. Sila tunggu...';
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                videoStream.getTracks().forEach(t => t.stop());
                videoStream = null;
                scanContainer.classList.add('hidden');
                
                return true;
                
            } catch (error) {
                console.error('❌ Verification error:', error);
                
                if (videoStream) {
                    videoStream.getTracks().forEach(t => t.stop());
                    videoStream = null;
                }
                
                scanContainer.classList.add('hidden');
                showNotification('Pengesahan Gagal', error.message || 'Gagal mengesahkan wajah', true, true);
                return false;
                
            } finally {
                isVerifying = false;
                clockInBtn.disabled = false;
                clockOutBtn.disabled = false;
                updateProgress(0);
                if (faceOverlay) faceOverlay.innerHTML = '';
            }
        }

        // ============================================
        // LOGIN - ENHANCED WITH ANIMATION
        // ============================================
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            // Reset error styling
            document.getElementById('loginEmail').style.borderColor = '';
            document.getElementById('loginPassword').style.borderColor = '';

            if (!email || !password) {
                if (!email) document.getElementById('loginEmail').style.borderColor = '#dc2626';
                if (!password) document.getElementById('loginPassword').style.borderColor = '#dc2626';
                showNotification('Ralat', 'Sila isi email dan kata laluan', true, false);
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';

            try {
                const result = await callAPI('userLogin', { email, password });
                
                if (result.success) {
                    currentUser = result.user;
                    
                    if (currentUser.faceDescriptor && currentUser.faceDescriptor !== '') {
                        try {
                            const descriptor = JSON.parse(currentUser.faceDescriptor);
                            const labeledDescriptor = new faceapi.LabeledFaceDescriptors(
                                currentUser.uid, 
                                [new Float32Array(descriptor)]
                            );
                            faceMatcher = new faceapi.FaceMatcher([labeledDescriptor]);
                        } catch (e) {
                            console.error('❌ Failed to create face matcher:', e);
                        }
                    }
                    
                    // Success animation
                    btn.style.backgroundColor = '#059669';
                    btn.innerHTML = '<span class="material-symbols-rounded">check</span> Berjaya';
                    
                    setTimeout(() => {
                        document.getElementById('userName').innerText = escapeHtml(currentUser.name);
                        document.getElementById('userDetail').innerText = `${escapeHtml(currentUser.branch)} • ${escapeHtml(currentUser.unit)}`;
                        
                        document.getElementById('loginPage').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        
                        loadFaceModels();
                        checkTodayAttendance();
                        startLocationTracking();
                        loadAttendanceHistory();
                        startClock();
                        
                        initAudio();
                        
                        showNotification('Selamat Datang', `Log masuk berjaya`, false, false);
                    }, 500);
                } else {
                    // Error animation
                    btn.style.backgroundColor = '#dc2626';
                    btn.innerHTML = 'Gagal';
                    showNotification('Log Masuk Gagal', result.error || 'Email atau kata laluan salah', true, true);
                    
                    setTimeout(() => {
                        btn.style.backgroundColor = '';
                        btn.disabled = false;
                        btn.classList.remove('loading');
                        btn.innerHTML = 'Log Masuk';
                    }, 1000);
                }
            } catch (error) {
                console.error('Login error:', error);
                showNotification('Ralat', 'Gagal berkomunikasi dengan pelayan', true, true);
                btn.style.backgroundColor = '#dc2626';
                btn.innerHTML = 'Ralat';
                
                setTimeout(() => {
                    btn.style.backgroundColor = '';
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    btn.innerHTML = 'Log Masuk';
                }, 1000);
            }
        };

        window.handleLogout = function() {
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            
            // Reset login button
            const btn = document.getElementById('loginBtn');
            btn.style.backgroundColor = '';
            btn.disabled = false;
            btn.classList.remove('loading');
            btn.innerHTML = 'Log Masuk';
            
            // Reset input fields
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginEmail').style.borderColor = '';
            document.getElementById('loginPassword').style.borderColor = '';
        };

        // ============================================
        // CLOCK IN / OUT
        // ============================================
        window.handleClockIn = async function() {
            if (!userLocation) {
                showNotification('Ralat Lokasi', 'Lokasi tidak dapat dikesan. Sila pastikan GPS dihidupkan.', true, true);
                return;
            }
            
            const distance = calculateDistance(
                userLocation.lat, userLocation.lng,
                parseFloat(currentUser.lat), parseFloat(currentUser.lng)
            );
            
            if (distance > (parseInt(currentUser.radius) || 500)) {
                showNotification('Geofencing', 'Anda berada di luar kawasan yang dibenarkan untuk clock in', true, true);
                return;
            }
            
            const verified = await verifyFace();
            if (!verified) {
                return;
            }
            
            const btn = document.getElementById('clockInBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';
            
            try {
                const result = await callAPI('clockIn', { 
                    uid: currentUser.uid, 
                    location: JSON.stringify(userLocation),
                    requestingUser: JSON.stringify(currentUser)
                });
                
                if (result.success) {
                    showNotification('Berjaya', 'Clock In direkodkan', false, true);
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    await checkTodayAttendance();
                    await loadAttendanceHistory();
                    updateLocationDisplay();
                    
                } else {
                    showNotification('Ralat', result.error || 'Gagal clock in', true, true);
                }
            } catch (error) {
                console.error('Clock in error:', error);
                showNotification('Ralat', 'Gagal berkomunikasi dengan pelayan', true, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'MASUK';
            }
        };

        window.handleClockOut = async function() {
            if (!userLocation) {
                showNotification('Ralat Lokasi', 'Lokasi tidak dapat dikesan. Sila pastikan GPS dihidupkan.', true, true);
                return;
            }
            
            const verified = await verifyFace();
            if (!verified) {
                return;
            }
            
            const btn = document.getElementById('clockOutBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';
            
            try {
                const result = await callAPI('clockOut', { 
                    uid: currentUser.uid, 
                    location: JSON.stringify(userLocation),
                    requestingUser: JSON.stringify(currentUser)
                });
                
                if (result.success) {
                    showNotification('Berjaya', 'Clock Out direkodkan', false, true);
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    await checkTodayAttendance();
                    await loadAttendanceHistory();
                    updateLocationDisplay();
                    
                } else {
                    showNotification('Ralat', result.error || 'Gagal clock out', true, true);
                }
            } catch (error) {
                console.error('Clock out error:', error);
                showNotification('Ralat', 'Gagal berkomunikasi dengan pelayan', true, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'KELUAR';
            }
        };

        // ============================================
        // ATTENDANCE HISTORY
        // ============================================
        async function loadAttendanceHistory() {
            if (!currentUser) return;
            
            const today = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            try {
                const result = await callAPI('getAttendance', { 
                    uid: currentUser.uid,
                    startDate: thirtyDaysAgo.toISOString().split('T')[0],
                    endDate: today.toISOString().split('T')[0],
                    requestingUser: JSON.stringify(currentUser)
                });
                
                const historyEl = document.getElementById('attendanceHistory');
                
                if (!result.success || !result.data || result.data.length === 0) {
                    historyEl.innerHTML = '<div class="text-center py-8 text-gray-400">Tiada rekod kehadiran</div>';
                    return;
                }
                
                let html = '';
                result.data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                result.data.forEach(record => {
                    const date = new Date(record.date);
                    const clockIn = record.clockIn ? new Date(record.clockIn) : null;
                    const clockOut = record.clockOut ? new Date(record.clockOut) : null;
                    
                    const clockInTime = clockIn ? clockIn.toLocaleTimeString('ms-MY', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        hour12: true 
                    }) : '--:--';
                    
                    const clockOutTime = clockOut ? clockOut.toLocaleTimeString('ms-MY', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        hour12: true 
                    }) : '--:--';
                    
                    const totalHours = record.totalHours ? parseFloat(record.totalHours).toFixed(1) : '-';
                    
                    const isToday = record.date === new Date().toISOString().split('T')[0];
                    const todayClass = isToday ? 'border-l-4 border-blue-500' : '';
                    
                    const weekday = date.toLocaleDateString('ms-MY', { weekday: 'long' });
                    const formattedDate = date.toLocaleDateString('ms-MY', { 
                        day: 'numeric', 
                        month: 'long', 
                        year: 'numeric' 
                    });
                    
                    html += `
                        <div class="bg-white p-4 rounded-2xl border hover:shadow-md transition-shadow ${todayClass}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">
                                    ${escapeHtml(weekday)}
                                </span>
                                <span class="text-xs text-gray-400">${escapeHtml(formattedDate)}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex gap-4">
                                    <div class="flex items-center gap-1">
                                        <span class="material-symbols-rounded text-sm text-green-600">login</span>
                                        <span class="text-sm font-bold">${clockInTime}</span>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <span class="material-symbols-rounded text-sm text-red-500">logout</span>
                                        <span class="text-sm font-bold">${clockOutTime}</span>
                                    </div>
                                </div>
                                <span class="text-xs font-bold ${totalHours >= 8 ? 'text-green-600' : 'text-orange-500'}">
                                    ${totalHours !== '-' ? totalHours + ' jam' : '-'}
                                </span>
                            </div>
                        </div>
                    `;
                });
                
                historyEl.innerHTML = html;
                
            } catch (error) {
                console.error('Load attendance error:', error);
            }
        }

        // ============================================
        // CLOCK
        // ============================================
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('realTimeClock').innerText = now.toLocaleTimeString('ms-MY', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: false 
                });
                document.getElementById('displayDate').innerText = now.toLocaleDateString('ms-MY', { 
                    weekday: 'long', 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                });
            }, 1000);
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadFaceModels();
            initAudio();
            
            if (!document.getElementById('faceOverlay')) {
                const overlay = document.createElement('div');
                overlay.id = 'faceOverlay';
                overlay.className = 'face-overlay';
                const videoContainer = document.querySelector('.video-wrapper');
                if (videoContainer) {
                    videoContainer.appendChild(overlay);
                }
            }
            
            setTimeout(() => window.scrollTo(0, 0), 100);
        });

        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        window.addEventListener('beforeunload', () => {
            if (videoStream) {
                videoStream.getTracks().forEach(t => t.stop());
            }
            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
            }
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                if (faceOverlay) faceOverlay.innerHTML = '';
            }, 300);
        });
    </script>
