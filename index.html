    <!-- Fonts & Icons -->

    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background: linear-gradient(135deg, #f0f5fa 0%, #e6edf4 100%);
            min-height: 100vh;
        }
        
        /* Login Page */
        .login-container {
            min-height: 100vh;
            background: linear-gradient(165deg, #0b1e33 0%, #132b41 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 36px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 50px 70px -20px rgba(0,0,0,0.5);
        }
        
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 16px;
            background: #f8fafc;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }
        
        .btn-primary {
            background: #1e3a8a;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            border: none;
        }
        
        .dashboard-header {
            background: linear-gradient(165deg, #0b1e33 0%, #132b41 100%);
            padding: 32px 24px 64px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        
        .glass-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 200px;
            border: 2px solid #fbbf24;
            border-radius: 80px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }
        
        .hidden { display: none !important; }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -150%);
            background: white;
            border-radius: 16px;
            padding: 16px 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            z-index: 9999;
            border-left: 4px solid #059669;
            transition: transform 0.3s;
        }
        
        .notification.show { transform: translate(-50%, 0); }
        .notification.error { border-left-color: #dc2626; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .challenge-box {
            background: #1e3a8a;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: #1e3a8a;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>

    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null;
        let userLocation = null;
        let videoStream = null;
        let faceMatcher = null;
        let locationWatchId = null;
        let modelsLoaded = false;
        let isVerifying = false;

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showNotification(title, message, isError = false) {
            const notif = document.getElementById('notification');
            document.getElementById('notifTitle').innerText = title;
            document.getElementById('notifMessage').innerText = message;
            notif.className = `notification show ${isError ? 'error' : ''}`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // ============================================
        // FACE API MODELS
        // ============================================
        async function loadFaceModels() {
            if (modelsLoaded) return;
            try {
                // Cuba load dari local models dulu
                const MODEL_URL = '/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                modelsLoaded = true;
                console.log("✅ Face models loaded from local");
            } catch (e) {
                console.error("❌ Gagal muat model wajah dari local", e);
                try {
                    // Backup dari CDN
                    const BACKUP_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                    await faceapi.nets.tinyFaceDetector.loadFromUri(BACKUP_URL);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(BACKUP_URL);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(BACKUP_URL);
                    modelsLoaded = true;
                    console.log("✅ Face models loaded from backup");
                } catch (e2) {
                    console.error("❌ Semua percubaan gagal", e2);
                    showNotification('Amaran', 'Pengesahan wajah mungkin tidak berfungsi', true);
                }
            }
        }

        // ============================================
        // LIVENESS DETECTION FUNCTIONS
        // ============================================
        
        // Kira Eye Aspect Ratio (EAR) untuk blink detection
        function calculateEAR(eye) {
            const p1 = eye[1];
            const p2 = eye[5];
            const p3 = eye[2];
            const p4 = eye[4];
            
            const height1 = Math.hypot(p2.x - p4.x, p2.y - p4.y);
            const height2 = Math.hypot(p3.x - p5.x, p3.y - p5.y);
            const width = Math.hypot(p1.x - p4.x, p1.y - p4.y);
            
            return (height1 + height2) / (2 * width);

async function testEyeBlink(video) {
    const scanStatus = document.getElementById('scanStatus');
    const challengeDisplay = document.getElementById('challengeDisplay');
    
    challengeDisplay.innerText = '👁️ TEST 1/3: Kejap mata 2 kali';
    scanStatus.innerText = 'Mengesan kejapan mata...';
    
    let blinks = 0;
    let prevEAR = null;
    const BLINK_THRESHOLD = 0.22; // TURUNKAN sedikit
    
    for (let i = 0; i < 30; i++) { // KURANGKAN kepada 30
        updateProgress((i / 30) * 33);
        
        await new Promise(resolve => setTimeout(resolve, 100));
        
        const detection = await faceapi.detectSingleFace(video, 
            new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks();
        
        if (detection && detection.landmarks) {
            const landmarks = detection.landmarks;
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();
            
            // Kira EAR untuk kedua-dua mata
            const leftEAR = (Math.hypot(leftEye[1].x - leftEye[5].x, leftEye[1].y - leftEye[5].y) +
                            Math.hypot(leftEye[2].x - leftEye[4].x, leftEye[2].y - leftEye[4].y)) /
                            (2 * Math.hypot(leftEye[0].x - leftEye[3].x, leftEye[0].y - leftEye[3].y));
            
            const rightEAR = (Math.hypot(rightEye[1].x - rightEye[5].x, rightEye[1].y - rightEye[5].y) +
                             Math.hypot(rightEye[2].x - rightEye[4].x, rightEye[2].y - rightEye[4].y)) /
                             (2 * Math.hypot(rightEye[0].x - rightEye[3].x, rightEye[0].y - rightEye[3].y));
            
            const ear = (leftEAR + rightEAR) / 2;
            
            if (prevEAR !== null && prevEAR > BLINK_THRESHOLD && ear < BLINK_THRESHOLD) {
                blinks++;
                console.log(`Blink detected! Count: ${blinks}`);
            }
            
            prevEAR = ear;
        }
    }
    
    return blinks >= 1; // KURANGKAN kepada 1 kejapan
}

// Test 2: Head Movement Detection (DIBETULKAN)
async function testHeadMovement(video) {
    const scanStatus = document.getElementById('scanStatus');
    const challengeDisplay = document.getElementById('challengeDisplay');
    
    challengeDisplay.innerText = '🔄 TEST 2/3: Gerak kepala perlahan';
    scanStatus.innerText = 'Mengesan pergerakan kepala...';
    
    let positions = [];
    let previousX = null;
    let direction = 0;
    let directionChanges = 0;
    
    for (let i = 0; i < 25; i++) { // KURANGKAN kepada 25
        updateProgress(33 + (i / 25) * 33);
        
        await new Promise(resolve => setTimeout(resolve, 100));
        
        try {
            const detection = await faceapi.detectSingleFace(video, 
                new faceapi.TinyFaceDetectorOptions());
            
            // PEMBETULAN UTAMA: Check structure dengan betul
            if (detection && detection.detection && detection.detection.box) {
                const box = detection.detection.box;
                const centerX = box.x + box.width/2;
                
                positions.push(centerX);
                
                if (previousX !== null) {
                    const newDirection = centerX > previousX ? 1 : -1;
                    if (direction !== 0 && newDirection !== direction) {
                        directionChanges++;
                    }
                    direction = newDirection;
                }
                
                previousX = centerX;
            }
        } catch (e) {
            console.log('Head movement detection error:', e);
        }
    }
    
    // Kira pergerakan
    if (positions.length < 3) {
        console.log('Head movement: Not enough positions');
        return false;
    }
    
    const maxPos = Math.max(...positions);
    const minPos = Math.min(...positions);
    const totalMovement = maxPos - minPos;
    
    console.log(`Head movement: ${totalMovement}px, Direction changes: ${directionChanges}`);
    
    // AMBANG RENDAH untuk mudahkan
    return totalMovement > 10; // Hanya perlu gerak sikit
}

// Test 3: Face Matching (DIBETULKAN)
async function testFaceMatch(video) {
    const scanStatus = document.getElementById('scanStatus');
    const challengeDisplay = document.getElementById('challengeDisplay');
    
    challengeDisplay.innerText = '👤 TEST 3/3: Mengesan wajah';
    scanStatus.innerText = 'Memadankan wajah dengan rekod...';
    
    updateProgress(90);
    await new Promise(resolve => setTimeout(resolve, 1000));
    
    const detection = await faceapi.detectSingleFace(video, 
        new faceapi.TinyFaceDetectorOptions())
        .withFaceDescriptor();
    
    if (!detection || !detection.descriptor) {
        throw new Error('Wajah tidak dikesan');
    }
    
    const match = faceMatcher.findBestMatch(detection.descriptor);
    console.log(`Face match distance: ${match.distance}`);
    
    // TINGKATKAN ambang kepada 0.65
    if (match.label !== currentUser.uid || match.distance >= 0.65) {
        throw new Error('Wajah tidak sepadan dengan rekod');
    }
    
    return true;
}

// Main verification function (DIBETULKAN)
async function verifyFace() {
    if (isVerifying) return false;
    isVerifying = true;
    
    if (!faceMatcher) {
        showNotification('Wajah Tidak Didaftar', 'Sila hubungi admin untuk pendaftaran wajah', true);
        isVerifying = false;
        return false;
    }
    
    const scanContainer = document.getElementById('scanContainer');
    const scanVideo = document.getElementById('scanVideo');
    const scanStatus = document.getElementById('scanStatus');
    const challengeDisplay = document.getElementById('challengeDisplay');
    const clockInBtn = document.getElementById('clockInBtn');
    const clockOutBtn = document.getElementById('clockOutBtn');
    
    scanContainer.classList.remove('hidden');
    clockInBtn.disabled = true;
    clockOutBtn.disabled = true;
    
    try {
        // Mula kamera
        scanStatus.innerText = 'Mengakses kamera...';
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: 'user',
                width: { ideal: 640 },
                height: { ideal: 480 }
            } 
        });
        
        scanVideo.srcObject = stream;
        videoStream = stream;
        
        // Tunggu kamera siap
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // TEST 1: Eye Blink Detection
        const blinkPassed = await testEyeBlink(scanVideo);
        if (!blinkPassed) {
            throw new Error('Gagal test kejapan mata. Sila kejap mata dengan jelas.');
        }
        
        // TEST 2: Head Movement Detection
        const headPassed = await testHeadMovement(scanVideo);
        if (!headPassed) {
            throw new Error('Gagal test pergerakan kepala. Sila gerak kepala perlahan.');
        }
        
        // TEST 3: Face Matching
        await testFaceMatch(scanVideo);
        
        // Semua test lulus
        updateProgress(100);
        challengeDisplay.innerText = '✅ PENGESAHAN BERJAYA';
        scanStatus.innerText = 'Wajah disahkan. Sila tunggu...';
        
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // Tutup kamera
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
        scanContainer.classList.add('hidden');
        
        showNotification('Berjaya', 'Pengesahan wajah berjaya');
        return true;
        
    } catch (error) {
        console.error('Verification error:', error);
        
        // Tutup kamera
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
        
        scanContainer.classList.add('hidden');
        showNotification('Pengesahan Gagal', error.message || 'Gagal mengesahkan wajah', true);
        return false;
        
    } finally {
        isVerifying = false;
        clockInBtn.disabled = false;
        clockOutBtn.disabled = false;
        updateProgress(0);
    }
}

        // ============================================
        // LOCATION
        // ============================================
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }

        function startLocationTracking() {
            if (!navigator.geolocation) {
                document.getElementById('locationStatus').innerText = 'GPS tidak disokong';
                return;
            }
            
            locationWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    if (currentUser && currentUser.lat && currentUser.lng) {
                        const distance = calculateDistance(
                            userLocation.lat,
                            userLocation.lng,
                            parseFloat(currentUser.lat),
                            parseFloat(currentUser.lng)
                        );
                        
                        const within = distance <= (parseInt(currentUser.radius) || 500);
                        
                        document.getElementById('locationStatus').innerHTML = within ? 
                            '<span class="text-green-600">✓ DALAM KAWASAN BERTUGAS</span>' : 
                            '<span class="text-red-500">✗ LUAR KAWASAN BERTUGAS</span>';
                        document.getElementById('distanceStatus').innerText = `${Math.round(distance)}m / ${currentUser.radius || 500}m`;
                    }
                },
                (error) => {
                    console.error('GPS error:', error);
                    document.getElementById('locationStatus').innerText = 'Gagal mengesan GPS';
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 30000,
                    timeout: 27000
                }
            );
        }

        // ============================================
        // ATTENDANCE
        // ============================================
        async function checkTodayAttendance() {
            const today = new Date().toISOString().split('T')[0];
            const result = await callAPI('getAttendance', { 
                uid: currentUser.uid, 
                startDate: today, 
                endDate: today 
            });
            
            if (result.success && result.data && result.data.length > 0) {
                const record = result.data[0];
                if (record.clockIn && (!record.clockOut || record.clockOut === '')) {
                    document.getElementById('attendanceStatus').innerText = 'DALAM BERTUGAS';
                    document.getElementById('clockInBtn').disabled = true;
                    document.getElementById('clockOutBtn').disabled = false;
                    document.getElementById('clockOutBtn').className = 'bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition-colors';
                } else if (record.clockIn && record.clockOut) {
                    document.getElementById('attendanceStatus').innerText = 'SELESAI';
                    document.getElementById('clockInBtn').disabled = true;
                    document.getElementById('clockOutBtn').disabled = true;
                }
            }
        }

        window.handleClockIn = async function() {
            if (!userLocation) {
                showNotification('Ralat Lokasi', 'Lokasi tidak dapat dikesan. Sila pastikan GPS dihidupkan.', true);
                return;
            }
            
            // Check geofencing
            const distance = calculateDistance(
                userLocation.lat, userLocation.lng,
                parseFloat(currentUser.lat), parseFloat(currentUser.lng)
            );
            
            if (distance > (parseInt(currentUser.radius) || 500)) {
                showNotification('Geofencing', 'Anda berada di luar kawasan yang dibenarkan untuk clock in', true);
                return;
            }
            
            // Liveness verification
            const verified = await verifyFace();
            if (!verified) {
                return; // Error message already shown in verifyFace
            }
            
            // Proceed with clock in
            const btn = document.getElementById('clockInBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading mx-auto"></div>';
            
            try {
                const result = await callAPI('clockIn', { 
                    uid: currentUser.uid, 
                    location: JSON.stringify(userLocation)
                });
                
                if (result.success) {
                    showNotification('Berjaya', 'Clock In direkodkan');
                    await checkTodayAttendance();
                    await loadAttendanceHistory();
                } else {
                    showNotification('Ralat', result.error || 'Gagal clock in', true);
                }
            } catch (error) {
                showNotification('Ralat', 'Gagal berkomunikasi dengan pelayan', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'MASUK';
            }
        };

        window.handleClockOut = async function() {
            if (!userLocation) {
                showNotification('Ralat Lokasi', 'Lokasi tidak dapat dikesan. Sila pastikan GPS dihidupkan.', true);
                return;
            }
            
            // Liveness verification
            const verified = await verifyFace();
            if (!verified) {
                return; // Error message already shown in verifyFace
            }
            
            // Proceed with clock out
            const btn = document.getElementById('clockOutBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading mx-auto"></div>';
            
            try {
                const result = await callAPI('clockOut', { 
                    uid: currentUser.uid, 
                    location: JSON.stringify(userLocation)
                });
                
                if (result.success) {
                    showNotification('Berjaya', 'Clock Out direkodkan');
                    await checkTodayAttendance();
                    await loadAttendanceHistory();
                } else {
                    showNotification('Ralat', result.error || 'Gagal clock out', true);
                }
            } catch (error) {
                showNotification('Ralat', 'Gagal berkomunikasi dengan pelayan', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'KELUAR';
            }
        };

        async function loadAttendanceHistory() {
            const today = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const result = await callAPI('getAttendance', { 
                uid: currentUser.uid,
                startDate: thirtyDaysAgo.toISOString().split('T')[0],
                endDate: today.toISOString().split('T')[0]
            });
            
            const historyEl = document.getElementById('attendanceHistory');
            
            if (!result.success || !result.data || result.data.length === 0) {
                historyEl.innerHTML = '<div class="text-center py-8 text-gray-400">Tiada rekod kehadiran</div>';
                return;
            }
            
            let html = '';
            result.data.sort((a, b) => new Date(b.date) - new Date(a.date)); // Sort by date descending
            
            result.data.forEach(record => {
                const date = new Date(record.date);
                const clockIn = record.clockIn ? new Date(record.clockIn) : null;
                const clockOut = record.clockOut ? new Date(record.clockOut) : null;
                
                const clockInTime = clockIn ? clockIn.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                const clockOutTime = clockOut ? clockOut.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                const totalHours = record.totalHours ? parseFloat(record.totalHours).toFixed(1) : '-';
                
                html += `
                    <div class="bg-white p-4 rounded-2xl border hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-center mb-2">
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">
                                ${record.weekday || '-'}
                            </span>
                            <span class="text-xs text-gray-400">${date.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-4">
                                <div class="flex items-center gap-1">
                                    <span class="material-symbols-rounded text-sm text-green-600">login</span>
                                    <span class="text-sm font-bold">${clockInTime}</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <span class="material-symbols-rounded text-sm text-red-500">logout</span>
                                    <span class="text-sm font-bold">${clockOutTime}</span>
                                </div>
                            </div>
                            <span class="text-xs font-bold ${totalHours >= 8 ? 'text-green-600' : 'text-orange-500'}">
                                ${totalHours !== '-' ? totalHours + ' jam' : '-'}
                            </span>
                        </div>
                    </div>
                `;
            });
            
            historyEl.innerHTML = html;
        }

        // ============================================
        // CLOCK
        // ============================================
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('realTimeClock').innerText = now.toLocaleTimeString('ms-MY', { hour12: false });
                document.getElementById('displayDate').innerText = now.toLocaleDateString('ms-MY', { 
                    weekday: 'long', 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                });
            }, 1000);
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        // Preload face models when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadFaceModels();
        });

        // Enter key for login
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (videoStream) {
                videoStream.getTracks().forEach(t => t.stop());
            }
            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
            }
        });
    </script>
</body>
</html>
